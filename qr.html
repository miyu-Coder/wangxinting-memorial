<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="生成各展点专属二维码，便于现场布设，扫码直达对应讲解页面。" />
  <title>展点二维码生成 · 王新亭将军红色教育基地</title>

  <!-- Open Graph 标签（微信/QQ分享用） -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="展点二维码生成" />
  <meta property="og:description" content="生成各展点专属二维码，便于现场布设，扫码直达对应讲解页面。" />
  <meta property="og:image" content="images/portrait.jpg" />
  <meta property="og:url" content="" id="og-url" />
  <meta property="og:site_name" content="王新亭将军红色教育基地" />

  <link rel="stylesheet" href="css/loading-progress.css" />
  <script src="js/loading-progress.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    .qr-grid {
      display: flex;
      flex-direction: column;
      gap: 20px;
      margin-top: 12px;
    }
    .qr-card {
      background: #fffefb;
      border-radius: var(--radius);
      padding: 18px;
      border: 1px solid rgba(212, 168, 67, 0.4);
      border-left: 4px solid var(--color-red);
      text-align: center;
      box-shadow: 0 4px 18px rgba(61, 24, 24, 0.06);
    }
    .qr-card canvas {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      background: #fff;
      padding: 8px;
      border: 1px dashed rgba(196, 30, 58, 0.22);
    }
    .qr-url {
      font-size: 0.82rem;
      color: var(--color-muted);
      word-break: break-all;
      margin-top: 10px;
    }
    .field-row {
      margin: 14px 0;
    }
    .field-row label {
      display: block;
      font-size: 0.9rem;
      color: var(--color-text-title);
      margin-bottom: 8px;
      font-weight: 500;
    }
    .field-row input {
      width: 100%;
      min-height: 44px;
      padding: 8px 14px;
      border-radius: 8px;
      border: 1px solid rgba(196, 30, 58, 0.22);
      background: #fdf8f2;
      color: var(--color-text);
      font-size: 1rem;
    }
    .field-row input:focus {
      outline: none;
      border-color: var(--color-red);
      box-shadow: 0 0 0 2px rgba(196, 30, 58, 0.12);
    }
  </style>
</head>
<body>
  <div class="page-shell">
    <header class="site-header site-header--official">
      <div class="site-brand-line" aria-hidden="true"></div>
      <h1 class="site-title site-title--serif">二维码生成</h1>
      <p class="site-subtitle site-subtitle--gold">王新亭将军红色教育基地 · 孝感</p>
      <p class="site-tagline">填写站点根地址后批量生成各展点扫码链接</p>
    </header>

    <main>
      <section class="section">
        <p class="section-body">
          每个展点生成两种二维码入口：一种从站点首页进入并打开对应展点，另一种直接进入展点讲解页。
          请在已部署的站点或本地预览服务中打开本页，以便读取展点信息。
        </p>
        <div class="field-row">
          <label for="base-url">站点根地址（不含末尾斜杠）</label>
          <input id="base-url" type="url" placeholder="https://your-project.vercel.app" autocomplete="off" />
        </div>
        <button type="button" class="btn btn-primary" id="btn-regenerate">重新生成全部</button>
      </section>

      <div class="banner-error" id="qr-error" hidden role="alert"></div>
      <div class="qr-grid" id="qr-grid"></div>

      <nav class="action-bar" style="margin-top: 24px;">
        <a class="btn btn-secondary" href="index.html">返回首页</a>
      </nav>
    </main>
  </div>

  <script>
    // 动态更新 Open Graph URL
    (function() {
      var ogUrl = document.getElementById("og-url");
      if (ogUrl) {
        ogUrl.setAttribute("content", window.location.href);
      }
    })();
  </script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
  <script>
    (function () {
      "use strict";

      function normalizeBase(raw) {
        var s = String(raw || "").trim();
        if (!s) return "";
        return s.replace(/\/+$/, "");
      }

      function buildUrls(base, id) {
        var b = normalizeBase(base);
        var u1 = b + "/?id=" + encodeURIComponent(String(id));
        var u2 = b + "/detail.html?id=" + encodeURIComponent(String(id));
        return { home: u1, detail: u2 };
      }

      function showError(msg) {
        var el = document.getElementById("qr-error");
        if (!el) return;
        el.textContent = msg;
        el.hidden = !msg;
      }

      function renderItem(container, title, url) {
        var card = document.createElement("div");
        card.className = "qr-card";
        var h = document.createElement("p");
        h.className = "location-card-title";
        h.style.marginTop = "0";
        h.textContent = title;
        var canvas = document.createElement("canvas");
        var u = document.createElement("p");
        u.className = "qr-url";
        u.textContent = url;
        card.appendChild(h);
        card.appendChild(canvas);
        card.appendChild(u);
        container.appendChild(card);
        if (typeof QRCode === "undefined") {
          showError("二维码生成组件加载失败，请检查网络后刷新页面。");
          return;
        }
        QRCode.toCanvas(canvas, url, { width: 220, margin: 2 }, function (err) {
          if (err) showError("二维码生成失败，请稍后重试。");
        });
      }

      function run() {
        var grid = document.getElementById("qr-grid");
        var input = document.getElementById("base-url");
        if (!grid || !input) return;
        grid.innerHTML = "";
        showError("");

        var base = input.value.trim();
        if (!base && window.location.protocol !== "file:") {
          input.value = window.location.origin;
          base = input.value.trim();
        }
        if (!base) {
          showError("请先填写站点根地址，或使用 http(s) 打开本页以自动填入当前域名。");
          return;
        }

        fetch("data/data.json", { cache: "no-store" })
          .then(function (r) {
            if (!r.ok) throw new Error("HTTP " + r.status);
            return r.json();
          })
          .then(function (data) {
            if (!Array.isArray(data)) throw new Error("数据格式错误");
            data
              .slice()
              .sort(function (a, b) {
                return (a.id || 0) - (b.id || 0);
              })
              .forEach(function (item) {
                var urls = buildUrls(base, item.id);
                renderItem(
                  grid,
                  (item.title || "地点") + " — 首页跳转",
                  urls.home
                );
                renderItem(
                  grid,
                  (item.title || "地点") + " — 详情页",
                  urls.detail
                );
              });
          })
          .catch(function (e) {
            showError(
              "无法读取展点数据。请通过静态服务器或已部署站点打开本页后再试。"
            );
          });
      }

      document.addEventListener("DOMContentLoaded", function () {
        if (window.location.protocol !== "file:") {
          var input = document.getElementById("base-url");
          if (input && !input.value) input.value = window.location.origin;
        }
        var btn = document.getElementById("btn-regenerate");
        if (btn) btn.addEventListener("click", run);
        run();
      });
    })();
  </script>
  <script src="js/lazy-load.js?v=1" defer></script>
</body>
</html>
