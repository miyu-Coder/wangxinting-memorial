<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="恭喜完成全部展点打卡！保存您的专属纪念证书，传承红色基因。" />
  <title>红色足迹纪念证书 · 王新亭将军红色教育基地</title>

  <!-- Open Graph 标签（微信/QQ分享用） -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="红色足迹纪念证书" />
  <meta property="og:description" content="恭喜完成全部展点打卡！保存您的专属纪念证书，传承红色基因。" />
  <meta property="og:image" content="images/portrait.jpg" />
  <meta property="og:url" content="" id="og-url" />
  <meta property="og:site_name" content="王新亭将军红色教育基地" />

  <link rel="stylesheet" href="css/loading-progress.css" />
  <script src="js/loading-progress.js"></script>
  <script src="js/font-size.js?v=1"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
  <link rel="stylesheet" href="css/certificate.css" />
</head>
<body class="certificate-page">
  <button type="button" class="wx-font-toggle" id="wx-font-toggle">Aa</button>
  <div class="page-shell page-shell--official certificate-shell">
    <header class="certificate-hero">
      <h1 class="certificate-title">王新亭将军红色教育基地</h1>
      <h2 class="certificate-subtitle">红色足迹纪念证书</h2>
    </header>

    <main class="certificate-main" id="certificate-main">
      <!-- 证书卡片容器 -->
      <div class="certificate-card">
        <!-- 四角装饰 -->
        <div class="certificate-corner certificate-corner--tl"></div>
        <div class="certificate-corner certificate-corner--tr"></div>
        <div class="certificate-corner certificate-corner--bl"></div>
        <div class="certificate-corner certificate-corner--br"></div>

        <!-- 证书标题 -->
        <h2 class="certificate-card-title">红色足迹纪念证书</h2>

        <!-- 证书内容 -->
        <p class="certificate-card-intro">恭喜您完成王新亭将军红色教育基地的全部参观打卡！</p>

        <!-- 完成信息 -->
        <div class="certificate-card-info">
          <p class="certificate-card-date" id="certificate-date">完成日期：<span>--年--月--日</span></p>
          <p class="certificate-card-count">已完成参观打卡展点 <strong>4</strong> 处</p>
        </div>

        <!-- 展点列表 -->
        <div class="certificate-card-sites" id="certificate-sites">
          <!-- 展点列表将通过JS动态渲染 -->
        </div>

        <!-- 感谢语 -->
        <div class="certificate-card-message">
          <p>感谢您参观王新亭将军红色教育基地</p>
          <p>让我们一起传承红色基因，赓续红色血脉！</p>
        </div>

        <!-- 印章 -->
        <div class="certificate-card-seal">
          <div class="certificate-card-seal-text">已完成</div>
        </div>
      </div>

      <!-- 按钮区域 -->
      <div class="certificate-actions">
        <button type="button" class="btn btn-primary certificate-btn-save" id="btn-save-certificate">
          保存纪念证书
        </button>
        <a class="btn btn-secondary certificate-btn-share" id="btn-share-certificate">
          分享给好友
        </a>
        <a class="btn btn-secondary certificate-btn-home" href="index.html">
          返回首页
        </a>
      </div>

      <p class="certificate-share-hint" id="certificate-hint" hidden>
        若浏览器拦截下载，请长按纪念证书图片另存。
      </p>
    </main>

    <footer class="site-footer site-footer--compact certificate-footer" role="contentinfo">
      <p class="site-footer__name">王新亭将军红色教育基地</p>
      <p class="site-footer__addr">湖北省孝感市孝南区朋兴乡北庙村</p>
    </footer>
  </div>

  <!-- 离屏画布：生成分享图片 -->
  <canvas id="certificate-canvas" width="750" height="1200" class="certificate-canvas" aria-hidden="true"></canvas>
  <div id="poster-preview-root"></div>

  <script>
    // 动态更新 Open Graph URL
    (function() {
      var ogUrl = document.getElementById("og-url");
      if (ogUrl) {
        ogUrl.setAttribute("content", window.location.href);
      }
    })();
  </script>
  <script src="js/storage.js?v=2"></script>
  <script src="js/checkin.js?v=1"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
  <script src="js/config.js"></script>
  <script src="js/poster-generator.js"></script>
  <script src="js/certificate.js?v=1" defer></script>
  <script src="js/lazy-load.js?v=1" defer></script>
</body>
</html>
