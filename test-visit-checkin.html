<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>打卡功能系统测试</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 800px; margin: 0 auto; }
        h2 { color: #c41e3a; border-bottom: 2px solid #d4a843; padding-bottom: 10px; }
        .section { margin: 30px 0; padding: 20px; background: #fdf8f2; border-radius: 8px; }
        button { padding: 10px 20px; margin: 5px; font-size: 16px; cursor: pointer; border: none; border-radius: 5px; }
        .reset-btn { background: #ff5252; color: white; }
        .test-btn { background: #c41e3a; color: white; }
        .check-status { margin: 10px 0; padding: 10px; background: #fff; border-left: 4px solid #d4a843; }
        .status-checked { border-color: #4CAF50; background: #e8f5e8; }
        .status-unchecked { border-color: #ff9800; background: #fff3e0; }
        .progress-info { background: #fff; padding: 15px; border-radius: 5px; margin: 10px 0; }
        .progress-bar { height: 20px; background: #e0e0e0; border-radius: 10px; overflow: hidden; margin: 10px 0; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #d4a843, #c41e3a); transition: width 0.3s ease; }
        .certificate-status { padding: 20px; background: #fff; border-radius: 8px; text-align: center; }
        .unlocked { color: #4CAF50; font-weight: bold; }
        .locked { color: #ff9800; }
    </style>
</head>
<body>
    <h1>🎯 打卡功能系统测试</h1>
    <p>点击下方按钮测试打卡功能，或手动模拟不同的打卡状态</p>

    <div class="section">
        <h2>一键测试方案</h2>
        <button class="test-btn" onclick="testScenario('complete')">全部打卡完成</button>
        <button class="test-btn" onclick="testScenario('partial')">部分打卡完成</button>
        <button class="test-btn" onclick="testScenario('none')">无任何打卡</button>
        <button class="reset-btn" onclick="resetCheckinData()">重置所有数据</button>
    </div>

    <div class="section">
        <h2>手动测试展点打卡</h2>
        <div id="manual-test">
            <!-- 展点打卡状态将通过JS生成 -->
        </div>
        <button class="test-btn" onclick="toggleAllSites()">切换所有展点状态</button>
        <button class="reset-btn" onclick="clearAllSites()">清空所有打卡</button>
    </div>

    <div class="section">
        <h2>打卡状态统计</h2>
        <div class="progress-info">
            <strong>当前打卡进度：</strong>
            <span id="progress-text">展点状态未加载</span>
            <div class="progress-bar">
                <div class="progress-fill" id="progress-fill" style="width: 0%"></div>
            </div>
            <div id="certificate-status" class="certificate-status">
                证书状态：<span id="certificate-state">未加载</span>
            </div>
        </div>
    </div>

    <div class="section">
        <h2>证书页面测试</h2>
        <button class="test-btn" onclick="viewCertificate()">查看纪念证书</button>
        <p>当完成全部 4 个展点的打卡后，会自动解锁纪念证书页面</p>
    </div>

    <div class="section">
        <h2>数据查看</h2>
        <button class="test-btn" onclick="showCurrentData()">显示当前打卡数据</button>
        <pre id="data-display" style="background: #f5f5f5; padding: 10px; border-radius: 5px; font-size: 14px; max-height: 300px; overflow: auto;"></pre>
    </div>

    <script src="js/storage.js?v=2"></script>
    <script src="js/checkin.js?v=1"></script>
    <script>
        // 展点数据
        var EXHIBITS = [
            { id: 1, title: "将军生平事迹陈列馆", short: "陈列馆" },
            { id: 2, title: "将军故居", short: "故居" },
            { id: 3, title: "纪念广场与将军纪念碑", short: "广场" },
            { id: 4, title: "退役军事装备实物展区", short: "装备" }
        ];

        // 初始化
        window.addEventListener('DOMContentLoaded', function() {
            initializeManualTest();
            updateProgressDisplay();
        });

        // 初始化手动测试区域
        function initializeManualTest() {
            var container = document.getElementById('manual-test');
            container.innerHTML = '';

            EXHIBITS.forEach(function(exhibit) {
                var checked = window.wxCheckin && window.wxCheckin.isChecked(exhibit.id);
                var div = document.createElement('div');
                div.className = 'check-status ' + (checked ? 'status-checked' : 'status-unchecked');
                div.innerHTML = '<strong>' + exhibit.short + '</strong>：' + exhibit.title + '<br>' +
                    (checked ? '✅ 已打卡' : '📷 未打卡');
                div.onclick = function() {
                    toggleSite(exhibit.id, exhibit.title);
                };
                div.style.cursor = 'pointer';
                container.appendChild(div);
            });
        }

        // 切换单个展点状态
        function toggleSite(id, title) {
            if (!window.wxCheckin) return;

            if (window.wxCheckin.isChecked(id)) {
                // 如果已打卡，重置为未打卡
                var state = JSON.parse(localStorage.getItem('wx_checkins') || '{}');
                delete state.exhibits[id];
                window.wxCheckin.saveState(state);
            } else {
                // 打卡
                var result = window.wxCheckin.checkIn(id);
            }

            initializeManualTest();
            updateProgressDisplay();
        }

        // 切换所有展点状态
        function toggleAllSites() {
            if (!window.wxCheckin) return;

            var total = window.wxCheckin.getTotalChecked();
            if (total === 4) {
                // 如果全部完成，则清空
                clearAllSites();
            } else {
                // 否则设置为全部完成
                setCompleteData();
            }
        }

        // 测试场景
        function testScenario(type) {
            switch(type) {
                case 'complete':
                    setCompleteData();
                    break;
                case 'partial':
                    setPartialData();
                    break;
                case 'none':
                    resetCheckinData();
                    break;
            }

            initializeManualTest();
            updateProgressDisplay();
            alert('已设置为"' + type + '"测试场景');
        }

        // 设置全部完成数据
        function setCompleteData() {
            var today = new Date();
            var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' +
                          String(today.getDate()).padStart(2, '0') + ' ' +
                          String(today.getHours()).padStart(2, '0') + ':' +
                          String(today.getMinutes()).padStart(2, '0') + ':' +
                          String(today.getSeconds()).padStart(2, '0');

            var data = {
                version: 1,
                exhibits: {
                    "1": { checked: true, time: todayStr },
                    "2": { checked: true, time: todayStr },
                    "3": { checked: true, time: todayStr },
                    "4": { checked: true, time: todayStr }
                },
                totalChecked: 4,
                certificateUnlocked: true
            };

            localStorage.setItem('wx_checkins', JSON.stringify(data));
        }

        // 设置部分完成数据
        function setPartialData() {
            var today = new Date();
            var todayStr = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' +
                          String(today.getDate()).padStart(2, '0') + ' ' +
                          String(today.getHours()).padStart(2, '0') + ':' +
                          String(today.getMinutes()).padStart(2, '0') + ':' +
                          String(today.getSeconds()).padStart(2, '0');

            var data = {
                version: 1,
                exhibits: {
                    "1": { checked: true, time: todayStr },
                    "2": { checked: true, time: todayStr },
                    "3": { checked: false, time: null },
                    "4": { checked: false, time: null }
                },
                totalChecked: 2,
                certificateUnlocked: false
            };

            localStorage.setItem('wx_checkins', JSON.stringify(data));
        }

        // 清空所有打卡
        function clearAllSites() {
            var data = {
                version: 1,
                exhibits: {},
                totalChecked: 0,
                certificateUnlocked: false
            };
            localStorage.setItem('wx_checkins', JSON.stringify(data));
            initializeManualTest();
            updateProgressDisplay();
        }

        // 重置所有数据
        function resetCheckinData() {
            localStorage.removeItem('wx_checkins');
            initializeManualTest();
            updateProgressDisplay();
            alert('已重置所有打卡数据');
        }

        // 更新进度显示
        function updateProgressDisplay() {
            if (!window.wxCheckin) {
                document.getElementById('progress-text').textContent = '打卡模块未加载';
                document.getElementById('progress-fill').style.width = '0%';
                return;
            }

            var total = window.wxCheckin.getTotalChecked();
            var percent = window.wxCheckin.getProgressPercent();
            var unlocked = window.wxCheckin.isCertificateUnlocked();

            document.getElementById('progress-text').textContent =
                '已完成 ' + total + '/4 个展点打卡（' + percent + '%）';

            document.getElementById('progress-fill').style.width = percent + '%';

            var stateEl = document.getElementById('certificate-state');
            if (unlocked) {
                stateEl.innerHTML = '<span class="unlocked">证书已解锁 🎉</span>';
            } else {
                stateEl.innerHTML = '<span class="locked">还需打卡 ' + (4 - total) + ' 个展点</span>';
            }
        }

        // 查看纪念证书
        function viewCertificate() {
            if (!window.wxCheckin || !window.wxCheckin.isCertificateUnlocked()) {
                alert('您还未集齐全部展点的打卡，需要完成 4/4 才能查看纪念证书');
                return;
            }
            window.location.href = 'certificate.html';
        }

        // 显示当前打卡数据
        function showCurrentData() {
            var data = localStorage.getItem('wx_checkins');
            document.getElementById('data-display').textContent = data ||
                '{
  "exhibits": {},
  "totalChecked": 0,
  "certificateUnlocked": false
}';
        }
    </script>
</body>
</html>
