<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" href="favicon.ico" type="image/x-icon" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="description" content="参观王新亭将军展点，了解将军生平事迹，参与知识问答，打卡留念。" />
  <title>展点讲解 · 王新亭将军红色教育基地</title>

  <!-- Open Graph 标签（微信/QQ分享用） -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="展点讲解 · 王新亭将军红色教育基地" id="og-title" />
  <meta property="og:description" content="参观王新亭将军展点，了解将军生平事迹，参与知识问答，打卡留念。" id="og-description" />
  <meta property="og:image" content="images/portrait.jpg" />
  <meta property="og:url" content="" id="og-url" />
  <meta property="og:site_name" content="王新亭将军红色教育基地" />

  <link rel="stylesheet" href="css/loading-progress.css" />
  <script src="js/loading-progress.js"></script>
  <script src="js/font-size.js?v=1"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;600&family=Noto+Serif+SC:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <button type="button" class="wx-font-toggle" id="wx-font-toggle">Aa</button>
  <div class="page-shell">
    <div class="banner-error" id="detail-error" hidden role="alert"></div>

    <header class="site-header site-header--official">
      <p class="detail-kicker" id="detail-kicker">王新亭将军红色教育基地</p>
      <h1 class="site-title site-title--serif" id="detail-page-title">讲解详情</h1>
      <p class="site-subtitle" id="detail-subtitle">加载中…</p>
      <p class="detail-exhibit-quiz-badge" id="detail-exhibit-quiz-badge" hidden aria-live="polite"></p>
      <p class="detail-global-progress" id="detail-global-progress" hidden aria-live="polite"></p>
    </header>

    <main id="detail-main" hidden>
      <!-- 顶部进度条（替代原参观动线卡片） -->
      <div class="detail-progress-bar" id="detail-progress-bar" role="navigation" aria-label="展点进度导航"></div>

      <section
        class="detail-block detail-audio-block"
        id="block-detail-audio"
        hidden
        aria-labelledby="detail-audio-heading"
      >
        <h2 id="detail-audio-heading" class="section-title section-title--serif">语音讲解</h2>
        <p class="detail-audio-tip" id="detail-audio-unsupported" hidden role="status">
          您的浏览器不支持音频播放
        </p>
        <p class="detail-audio-tip" id="detail-audio-coming" hidden role="status">音频即将上线</p>
        <div class="detail-audio-player-card" id="detail-audio-player-wrap" hidden>
          <p class="detail-audio-load-msg" id="detail-audio-load-msg" hidden role="alert">音频暂时无法播放</p>
          <p class="detail-audio-hint-soft" id="detail-audio-hint-soft">
            受浏览器策略影响，请点击播放；参观时请佩戴耳机，勿外放干扰他人。
          </p>
          <audio id="detail-audio" preload="metadata" playsinline></audio>
          <div class="detail-audio-controls" id="detail-audio-controls">
            <!-- 第一行：播放按钮 -->
            <div class="detail-audio-row detail-audio-row--main">
              <button type="button" class="detail-audio-play" id="detail-audio-play" aria-pressed="false" aria-label="播放">
                <span class="detail-audio-play-icon" aria-hidden="true">▶</span>
              </button>
            </div>
            <!-- 第二行：进度条 -->
            <div class="detail-audio-track-col">
              <div class="detail-audio-seek-wrap">
                <div class="detail-audio-seek-rail" aria-hidden="true">
                  <div class="detail-audio-seek-fill" id="detail-audio-seek-fill"></div>
                </div>
                <input
                  type="range"
                  class="detail-audio-seek"
                  id="detail-audio-seek"
                  min="0"
                  max="1000"
                  value="0"
                  step="1"
                  aria-label="播放进度"
                />
              </div>
            </div>
            <!-- 第三行：时间和倍速 -->
            <div class="detail-audio-row detail-audio-row--meta">
              <div class="detail-audio-times">
                <span id="detail-audio-time-curr">00:00</span>
                <span class="detail-audio-times-sep" aria-hidden="true">/</span>
                <span id="detail-audio-time-dur">--:--</span>
              </div>
              <button type="button" class="detail-audio-rate" id="detail-audio-rate" aria-label="播放速度 1.0x">
                1.0x
              </button>
            </div>
          </div>
        </div>
      </section>

      <section class="detail-block" aria-labelledby="carousel-label">
        <p id="carousel-label" class="placeholder-label">图片展示</p>
        <div class="carousel" id="detail-carousel" hidden>
          <div class="carousel-viewport" id="carousel-viewport">
            <img
              id="carousel-image"
              class="carousel-image lazy-image"
              alt=""
              loading="lazy"
              hidden
            />
            <div id="carousel-placeholder-slide" class="carousel-placeholder-slide" hidden>
              <span id="carousel-placeholder-text" class="carousel-placeholder-text"></span>
            </div>
          </div>
          <div class="carousel-toolbar">
            <button type="button" class="carousel-btn" id="carousel-prev" aria-label="上一张">‹</button>
            <div class="carousel-dots" id="carousel-dots" aria-label="选择图片"></div>
            <button type="button" class="carousel-btn" id="carousel-next" aria-label="下一张">›</button>
          </div>
        </div>
      </section>

      <section class="detail-block detail-text-block" aria-labelledby="text-label">
        <p id="text-label" class="placeholder-label">文字介绍</p>
        <div class="section-body detail-text-scroll" id="detail-text"></div>
        <button type="button" class="detail-text-expand" id="detail-text-expand">▼ 展开全文</button>
      </section>

      <section class="detail-block detail-checkin-block" id="block-checkin" aria-labelledby="checkin-label">
        <h2 id="checkin-label" class="section-title section-title--serif">参观打卡</h2>
        <div class="checkin-container" id="checkin-container">
          <!-- 打卡状态将通过JS动态渲染 -->
        </div>
      </section>

      <section class="detail-block flower-tribute-block" id="block-flower-tribute" aria-labelledby="flower-tribute-label">
        <h2 id="flower-tribute-label" class="section-title section-title--serif">献花致敬</h2>
        <div id="flower-tribute-root"></div>
      </section>

      <p class="detail-qr-hint" id="detail-qr-hint">📱 您正在通过现场二维码访问该讲解内容</p>

      <section class="detail-block" id="block-video" hidden aria-labelledby="video-label">
        <p id="video-label" class="placeholder-label">视频资料</p>
        <video
          id="detail-video"
          class="detail-video"
          controls
          playsinline
          preload="metadata"
        ></video>
        <p class="video-caption" id="video-caption"></p>
      </section>

      <section class="detail-block detail-quiz-block" id="block-quiz" hidden aria-labelledby="quiz-label">
        <h2 id="quiz-label" class="quiz-section-title">知识问答</h2>
        <p class="quiz-exhibit-status" id="quiz-exhibit-status" aria-live="polite"></p>
        <div id="quiz-root" class="quiz-root"></div>
      </section>

      <!-- 底部导航按钮 -->
      <nav class="detail-nav-buttons" id="detail-nav-buttons" role="navigation" aria-label="展点导航">
        <button type="button" class="btn btn-nav-prev" id="btn-prev-location">
          ← 上一展点
        </button>
        <button type="button" class="btn btn-nav-next" id="btn-next-location">
          下一展点 →
        </button>
      </nav>

      <nav class="action-bar action-bar--single" aria-label="导航入口">
        <button type="button" class="btn btn-map-nav btn-full-width" id="btn-open-map">
          📍 导航到基地
        </button>
      </nav>
      <nav class="action-bar action-bar--single" aria-label="返回导航">
        <a class="btn btn-primary btn-home-only" href="index.html">返回首页</a>
      </nav>
    </main>

    <div class="retry-wrap" id="detail-retry-wrap" aria-live="polite">
      <button type="button" class="btn btn-secondary" id="btn-retry-load">重新加载</button>
      <a class="btn btn-secondary" href="index.html">返回首页</a>
    </div>

    <footer class="site-footer site-footer--military" role="contentinfo">
      <div class="site-footer__bar">
        <span class="site-footer__star" aria-hidden="true">★</span>
        <span class="site-footer__slogan">传承红色基因，担当强军重任</span>
      </div>
      <p class="site-footer__disclaimer">本页面为导览辅助，展陈内容以馆内说明为准</p>
    </footer>
  </div>
  <script src="js/common.js?v=1"></script>
  <script src="js/nav-utils.js?v=3"></script>
  <script src="js/timeline.js?v=5"></script>
  <script src="js/storage.js?v=2"></script>
  <script src="js/checkin.js?v=1"></script>
  <script src="js/flowers.js?v=1"></script>
  <script src="js/audio-player.js?v=1"></script>
  <script src="js/map-navigation.js" defer></script>
  <script src="js/detail.js?v=10" defer></script>
  <script src="js/lazy-load.js?v=1" defer></script>
  <script>
    (function() {
      var sessionId = localStorage.getItem('visitor_session_id');
      if (!sessionId) {
        sessionId = crypto.randomUUID();
        localStorage.setItem('visitor_session_id', sessionId);
      }
      var urlParams = new URLSearchParams(window.location.search);
      var exhibitId = urlParams.get('id');
      if (exhibitId && ['1', '2', '3', '4'].includes(exhibitId)) {
        fetch('/api/track/page', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ page: 'detail_' + exhibitId, session_id: sessionId })
        }).catch(function() {});
      }
    })();
  </script>
</body>
</html>
