<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>优化后的打卡功能演示</title>
    <style>
        body {
            font-family: 'Noto Sans SC', 'Microsoft YaHei', sans-serif;
            margin: 0;
            padding: 20px;
            background: #fdf8f2;
        }
        .demo-container {
            max-width: 400px;
            margin: 0 auto;
            background: #fff;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(61, 24, 24, 0.1);
            border-left: 6px solid #c41e3a;
        }
        .demo-card {
            margin-bottom: 20px;
            padding: 20px;
            background: #fff;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-left: 6px solid #c41e3a;
        }
        .demo-title {
            color: #c41e3a;
            font-weight: 600;
            margin-bottom: 8px;
        }
        .demo-progress {
            margin: 8px 0;
        }
        .progress-bar {
            height: 14px;
            background: #f0f0f0;
            border-radius: 7px;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #d4a843, #b8923a);
        }
        .demo-btn {
            padding: 12px 20px;
            border: none;
            border-radius: 24px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .btn-checkin {
            background: linear-gradient(135deg, #c41e3a, #7a1528);
            color: #fff;
        }
        .btn-checkin:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(196, 30, 58, 0.3);
        }
        .btn-cert {
            background: linear-gradient(135deg, #d4a843, #b8923a);
            color: #fff;
            margin-top: 12px;
        }
        .status-label {
            color: #666;
            font-size: 14px;
            margin: 4px 0;
        }
        .link-group {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .link {
            flex: 1;
            padding: 8px;
            background: #f5f5f5;
            border-radius: 6px;
            text-align: center;
            text-decoration: none;
            color: #c41e3a;
            font-size: 12px;
            transition: all 0.2s;
        }
        .link:hover {
            background: #e0e0e0;
        }
    </style>
</head>
<body>
    <div class="demo-container">
        <h2>🎯 打卡功能演示</h2>
        <p>点击下方链接查看优化后的效果：</p>

        <div class="link-group">
            <a href="index.html" class="link">查看首页</a>
            <a href="detail.html?id=1" class="link">展厅详情</a>
        </div>

        <div class="demo-card">
            <div class="demo-title">🏆 红色足迹打卡中 2/4</div>
            <div class="demo-progress">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 50%"></div>
                </div>
            </div>
            <p class="status-label">📍 红色足迹打卡中</p>
            <p class="status-label">📍 集齐四个展点解锁纪念证书</p>
        </div>

        <div class="demo-card">
            <div class="demo-title">📍 参观打卡</div>
            <p style="color: #666; font-size: 14px;">在这里留下您的足迹，集齐四个展点解锁纪念证书！</p>
            <button class="demo-btn btn-checkin">📷 打卡留念</button>
            <div class="demo-progress" style="margin-top: 12px;">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 50%"></div>
                </div>
            </div>
            <p class="status-label">当前进度：2/4</p>
        </div>

        <div class="demo-card" style="border-left-color: #4CAF50;">
            <div class="demo-title" style="color: #4CAF50;">✅ 已打卡留念</div>
            <p style="color: #4CAF50; margin: 0;">🎉 感谢您的参观！</p>
            <p class="status-label" style="border-left: 3px solid #d4a843; padding-left: 8px; margin-top: 8px;">
                打卡时间：2026年4月12日 15:30
            </p>
            <div class="demo-progress" style="margin-top: 12px;">
                <div class="progress-bar">
                    <div class="progress-fill" style="width: 100%"></div>
                </div>
            </div>
            <p class="status-label">打卡进度：4/4</p>
            <button class="demo-btn btn-cert">🎉 查看证书 ❯</button>
        </div>
    </div>
</body>
</html>
