<body class="achievement-page">
  <button type="button" class="wx-font-toggle" id="wx-font-toggle">Aa</button>

    <header class="achievement-hero">

      <div class="achievement-hero__content">
        <p class="achievement-hero__kicker">王新亭将军红色教育基地</p>
        <p class="achievement-hero__nickname" id="achievement-nickname"></p>

    </header>

    <main class="achievement-main" id="achievement-main" hidden>
      <section class="achievement-stats" aria-labelledby="stats-heading">
        <h2 id="stats-heading" class="achievement-section-title">成就统计</h2>
        <div class="achievement-title-badge" id="achievement-title-badge"></div>

          </div>
          <div class="achievement-stat-card">

            <p class="achievement-stat-card__value achievement-stat-card__value--gold" id="stat-score">—</p>
          </div>
          <div class="achievement-stat-card">
            <p class="achievement-stat-card__label">总用时</p>
            <p class="achievement-stat-card__value achievement-stat-card__value--time" id="stat-time">⏱️ --</p>
          </div>
        </div>
      </section>

      <section class="achievement-list-section" aria-labelledby="list-heading">
        <h2 id="list-heading" class="achievement-section-title">各展点详情</h2>
        <div class="achievement-encouragement" id="achievement-encouragement"></div>
        <div class="achievement-progress-container">
          <div class="achievement-progress-bar">

          <span class="achievement-progress-text" id="achievement-progress-text">0%</span>

        <button type="button" class="btn btn-primary btn-ripple achievement-btn-share" id="btn-share-poster">

        </button>
        <a class="btn btn-gold achievement-btn-rankings" href="rankings.html">🏆 查看答题排行榜</a>
        <a class="btn btn-secondary achievement-btn-home" href="index.html">🏛️ 再访教育基地</a>

          若浏览器拦截下载，请长按海报图片另存。
        </p>
      </section>
    </main>

    <div class="achievement-empty" id="achievement-empty" hidden>
      <p class="achievement-empty__icon">🌱</p>
      <p class="achievement-empty__text">尚未开始红色传承之旅，前往展点完成打卡和答题吧！</p>
      <a class="btn btn-primary achievement-empty__btn" href="index.html">🏛️ 前往参观</a>
    </div>

    <div class="achievement-error" id="achievement-error" hidden role="alert"></div>
