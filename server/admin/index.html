<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>后台管理 · 王新亭将军教育基地</title>
  <style>
    :root {
      --color-red: #C41E3A;
      --color-red-deep: #7A1528;
      --color-gold: #D4A843;
      --color-green: #4CAF50;
      --color-orange: #FF9800;
      --color-bg: #F5F7FA;
      --color-surface: #ffffff;
      --color-text: #333333;
      --color-text-secondary: #666666;
      --color-border: #E8E8E8;
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.06);
      --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.08);
      --shadow-lg: 0 8px 32px rgba(0, 0, 0, 0.12);
      --radius: 16px;
      --radius-sm: 8px;
      --font-sans: 'Noto Sans SC', 'PingFang SC', 'Microsoft YaHei', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { font-size: 16px; -webkit-text-size-adjust: 100%; }
    body { font-family: var(--font-sans); background-color: var(--color-bg); color: var(--color-text); line-height: 1.6; min-height: 100vh; }
    .admin-container { min-height: 100vh; }
    .login-box { display: flex; flex-direction: column; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .login-title { font-size: 2rem; margin-bottom: 40px; color: var(--color-red); text-align: center; font-weight: 700; }
    .login-form { background: var(--color-surface); padding: 48px 40px; border-radius: var(--radius); box-shadow: var(--shadow-lg); width: 100%; max-width: 360px; border-top: 4px solid var(--color-gold); }
    .form-group { margin-bottom: 24px; }
    .form-group label { display: block; margin-bottom: 8px; font-weight: 600; color: var(--color-text); }
    .form-group input { width: 100%; padding: 14px 16px; border: 2px solid var(--color-border); border-radius: var(--radius-sm); font-size: 1rem; transition: border-color 0.2s, box-shadow 0.2s; }
    .form-group input:focus { outline: none; border-color: var(--color-red); box-shadow: 0 0 0 3px rgba(196, 30, 58, 0.1); }
    .login-hint { text-align: center; font-size: 0.9rem; color: #999; margin-top: 24px; }
    .admin-box { display: flex; flex-direction: column; min-height: 100vh; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; padding: 16px 32px; background: linear-gradient(135deg, var(--color-red) 0%, var(--color-red-deep) 100%); color: white; box-shadow: var(--shadow-md); position: sticky; top: 0; z-index: 100; }
    .admin-title { font-size: 1.5rem; font-weight: 700; letter-spacing: 0.5px; }
    .admin-header .btn-secondary { background: rgba(255, 255, 255, 0.15); color: white; border: 1px solid rgba(255, 255, 255, 0.3); }
    .admin-header .btn-secondary:hover { background: rgba(255, 255, 255, 0.25); }
    .admin-tabs { display: flex; gap: 0; background: var(--color-surface); padding: 0 32px; border-bottom: 1px solid var(--color-border); position: sticky; top: 64px; z-index: 90; }
    .tab-btn { padding: 16px 24px; border: none; background: transparent; color: var(--color-text-secondary); font-size: 1rem; font-weight: 500; cursor: pointer; border-bottom: 3px solid transparent; transition: all 0.2s; display: flex; align-items: center; gap: 8px; }
    .tab-btn:hover { color: var(--color-red); background: rgba(196, 30, 58, 0.04); }
    .tab-btn.is-active { color: var(--color-red); border-bottom-color: var(--color-red); font-weight: 600; }
    .tab-content { display: none; padding: 24px 32px; flex: 1; }
    .tab-content.is-active { display: block; }
    .tab-content h2 { font-size: 1.25rem; color: var(--color-text); margin-bottom: 20px; font-weight: 600; }
    .dashboard-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; margin-bottom: 32px; }
    .stat-card { background: var(--color-surface); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow-sm); display: flex; flex-direction: column; align-items: center; text-align: center; transition: transform 0.2s, box-shadow 0.2s; border: 1px solid var(--color-border); }
    .stat-card:hover { transform: translateY(-2px); box-shadow: var(--shadow-md); }
    .stat-card--warning { border: 2px solid var(--color-orange); background: linear-gradient(135deg, #FFF8F0 0%, var(--color-surface) 100%); }
    .stat-card--warning .stat-value { color: var(--color-orange); }
    .stat-card--gold { border: 2px solid var(--color-gold); background: linear-gradient(135deg, #FFFDF5 0%, var(--color-surface) 100%); }
    .stat-card--gold .stat-value { color: var(--color-gold); }
    .stat-card--gold .stat-icon { background: linear-gradient(135deg, rgba(212, 168, 67, 0.2) 0%, rgba(212, 168, 67, 0.05) 100%); }
    .stat-icon { width: 48px; height: 48px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.5rem; margin-bottom: 12px; background: linear-gradient(135deg, rgba(196, 30, 58, 0.1) 0%, rgba(212, 168, 67, 0.1) 100%); }
    .stat-card--warning .stat-icon { background: linear-gradient(135deg, rgba(255, 152, 0, 0.15) 0%, rgba(255, 152, 0, 0.05) 100%); }
    .stat-label { font-size: 0.9rem; color: var(--color-text-secondary); font-weight: 500; margin-bottom: 8px; }
    .stat-value { font-size: 2.25rem; font-weight: 700; color: var(--color-red); line-height: 1.2; }
    .stat-value--small { font-size: 1.5rem; }
    .stat-sublabel { font-size: 0.8rem; color: #999; margin-top: 4px; }
    .chart-section { background: var(--color-surface); padding: 24px; border-radius: var(--radius); box-shadow: var(--shadow-sm); margin-bottom: 24px; border: 1px solid var(--color-border); }
    .chart-section h3 { font-size: 1rem; color: var(--color-text); margin-bottom: 20px; padding-bottom: 12px; border-bottom: 1px solid var(--color-border); font-weight: 600; }
    .message-filter { display: flex; gap: 8px; margin-bottom: 20px; padding: 4px; background: #F0F0F0; border-radius: var(--radius-sm); width: fit-content; }
    .filter-btn { padding: 10px 20px; border: none; background: transparent; border-radius: 6px; color: var(--color-text-secondary); font-size: 0.9rem; font-weight: 500; cursor: pointer; transition: all 0.2s; }
    .filter-btn:hover { color: var(--color-text); }
    .filter-btn.is-active { background: var(--color-surface); color: var(--color-red); box-shadow: var(--shadow-sm); font-weight: 600; }
    .message-list { display: flex; flex-direction: column; gap: 12px; }
    .message-card { background: var(--color-surface); padding: 20px 24px; border-radius: var(--radius); box-shadow: var(--shadow-sm); border: 1px solid var(--color-border); border-left: 4px solid #ccc; transition: transform 0.2s, box-shadow 0.2s; }
    .message-card:hover { transform: translateX(4px); box-shadow: var(--shadow-md); }
    .message-card.status-pending { border-left-color: var(--color-orange); }
    .message-card.status-approved { border-left-color: var(--color-green); }
    .message-card.status-rejected { border-left-color: var(--color-red); }
    .message-meta { display: flex; gap: 12px; align-items: center; margin-bottom: 12px; font-size: 0.9rem; flex-wrap: wrap; }
    .message-meta strong { color: var(--color-red); font-weight: 600; }
    .message-time { color: #999; font-size: 0.85rem; }
    .message-status { padding: 4px 12px; border-radius: 20px; font-weight: 600; font-size: 0.75rem; margin-left: auto; }
    .message-status.status-pending { background: #FFF3E0; color: #E65100; }
    .message-status.status-approved { background: #E8F5E9; color: #2E7D32; }
    .message-status.status-rejected { background: #FFEBEE; color: #C62828; }
    .message-content { margin: 0 0 16px; line-height: 1.7; white-space: pre-wrap; word-break: break-word; color: var(--color-text); font-size: 0.95rem; }
    .message-actions { display: flex; gap: 12px; padding-top: 12px; border-top: 1px solid var(--color-border); }
    .btn { padding: 12px 24px; border: none; border-radius: var(--radius-sm); font-size: 1rem; font-weight: 600; cursor: pointer; transition: all 0.2s; }
    .btn-primary { background: linear-gradient(135deg, var(--color-red), var(--color-red-deep)); color: white; width: 100%; }
    .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3); }
    .btn-secondary { background: var(--color-surface); color: var(--color-text); border: 1px solid var(--color-border); padding: 10px 20px; font-size: 0.9rem; }
    .btn-secondary:hover { background: #F5F5F5; }
    .btn-approve { padding: 10px 24px; font-size: 0.9rem; background: var(--color-green); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .btn-approve:hover { background: #43A047; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(76, 175, 80, 0.3); }
    .btn-reject { padding: 10px 24px; font-size: 0.9rem; background: var(--color-red); color: white; border: none; border-radius: var(--radius-sm); cursor: pointer; font-weight: 600; transition: all 0.2s; }
    .btn-reject:hover { background: #A01830; transform: translateY(-1px); box-shadow: 0 4px 12px rgba(196, 30, 58, 0.3); }
    .empty-hint { text-align: center; color: #999; padding: 60px 20px; background: var(--color-surface); border-radius: var(--radius); border: 1px dashed var(--color-border); }
  </style>
</head>
<body class="admin-page">
  <div class="admin-container">
    <div id="loginBox" class="login-box">
      <h1 class="login-title">后台管理系统</h1>
      <form id="loginForm" class="login-form">
        <div class="form-group">
          <label for="adminPassword">管理员密码</label>
          <input id="adminPassword" type="password" placeholder="请输入管理员密码" required />
        </div>
        <button type="submit" class="btn btn-primary">登录</button>
      </form>
    </div>

    <div id="adminBox" class="admin-box" style="display: none;">
      <header class="admin-header">
        <h1 class="admin-title">后台管理系统</h1>
        <button id="logoutBtn" class="btn btn-secondary">退出登录</button>
      </header>

      <nav class="admin-tabs">
        <button class="tab-btn is-active" data-tab="dashboard">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
          数据看板
        </button>
        <button class="tab-btn" data-tab="messages">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
          留言审核
        </button>
      </nav>

      <section id="dashboardTab" class="tab-content is-active">
        <h2>数据概览</h2>
        <div class="dashboard-grid">
          <div class="stat-card">
            <div class="stat-icon">🌸</div>
            <p class="stat-label">献花总数</p>
            <p class="stat-value" id="totalFlowers">—</p>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📍</div>
            <p class="stat-label">打卡人数</p>
            <p class="stat-value" id="totalCheckins">—</p>
          </div>
          <div class="stat-card">
            <div class="stat-icon">💬</div>
            <p class="stat-label">留言总数</p>
            <p class="stat-value" id="totalMessages">—</p>
          </div>
          <div class="stat-card stat-card--warning">
            <div class="stat-icon">⏳</div>
            <p class="stat-label">待审核数量</p>
            <p class="stat-value" id="pendingMessages">—</p>
          </div>
        </div>

        <div class="dashboard-grid">
          <div class="stat-card">
            <div class="stat-icon">👀</div>
            <p class="stat-label">总访问量</p>
            <p class="stat-value" id="totalVisits">—</p>
          </div>
          <div class="stat-card">
            <div class="stat-icon">📅</div>
            <p class="stat-label">今日访问</p>
            <p class="stat-value" id="todayVisits">—</p>
          </div>
          <div class="stat-card stat-card--gold">
            <div class="stat-icon">🔥</div>
            <p class="stat-label">最热展点</p>
            <p class="stat-value stat-value--small" id="hotExhibit">—</p>
            <p class="stat-sublabel" id="hotExhibitCount"></p>
          </div>
        </div>

        <div class="chart-section">
          <h3>各展点献花数（单位：人）</h3>
          <div id="flowerChart" style="width: 100%; height: 250px;"></div>
        </div>

        <div class="chart-section">
          <h3>各展点打卡人数（单位：次）</h3>
          <div id="checkinChart" style="width: 100%; height: 250px;"></div>
        </div>
      </section>

      <section id="messagesTab" class="tab-content">
        <h2>留言审核</h2>
        <div class="message-filter">
          <button class="filter-btn" data-filter="all">全部</button>
          <button class="filter-btn is-active" data-filter="pending">待审核</button>
          <button class="filter-btn" data-filter="approved">已通过</button>
          <button class="filter-btn" data-filter="rejected">已拒绝</button>
        </div>
        <div class="message-list" id="messageList"></div>
      </section>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <script>
    const SESSION_KEY = 'adminSession';
    let currentFilter = 'pending';
    let allMessagesData = [];
    let flowerChart = null;
    let checkinChart = null;

    function checkLogin() {
      const session = localStorage.getItem(SESSION_KEY);
      if (session === 'true') {
        showAdminBox();
      } else {
        showLoginBox();
      }
    }

    function showLoginBox() {
      document.getElementById('loginBox').style.display = 'flex';
      document.getElementById('adminBox').style.display = 'none';
    }

    function showAdminBox() {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('adminBox').style.display = 'flex';
      loadDashboard();
      loadMessages();
    }

    document.getElementById('loginForm').addEventListener('submit', function (e) {
      e.preventDefault();
      const pwd = document.getElementById('adminPassword').value;
      
      fetch('/api/admin/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ password: pwd })
      })
      .then(res => res.json())
      .then(data => {
        if (data.success) {
          localStorage.setItem(SESSION_KEY, 'true');
          document.getElementById('adminPassword').value = '';
          showAdminBox();
        } else {
          alert(data.message || '密码错误');
        }
      })
      .catch(err => {
        console.error('Login error:', err);
        alert('登录失败，请检查网络连接');
      });
    });

    document.getElementById('logoutBtn').addEventListener('click', function () {
      localStorage.removeItem(SESSION_KEY);
      showLoginBox();
    });

    document.querySelectorAll('.tab-btn').forEach((btn) => {
      btn.addEventListener('click', function () {
        const tab = this.getAttribute('data-tab');
        document.querySelectorAll('.tab-btn').forEach((b) => b.classList.remove('is-active'));
        document.querySelectorAll('.tab-content').forEach((c) => c.classList.remove('is-active'));
        this.classList.add('is-active');
        document.getElementById(tab + 'Tab').classList.add('is-active');
        if (tab === 'messages') {
          loadMessages();
        } else {
          loadDashboard();
        }
      });
    });

    document.querySelectorAll('.filter-btn').forEach((btn) => {
      btn.addEventListener('click', function () {
        currentFilter = this.getAttribute('data-filter');
        document.querySelectorAll('.filter-btn').forEach((b) => b.classList.remove('is-active'));
        this.classList.add('is-active');
        renderMessages();
      });
    });

    function initCharts() {
      if (!flowerChart) {
        flowerChart = echarts.init(document.getElementById('flowerChart'));
      }
      if (!checkinChart) {
        checkinChart = echarts.init(document.getElementById('checkinChart'));
      }
    }

    function renderFlowerChart(data) {
      if (!flowerChart) return;
      const total = data.reduce((a, b) => a + b, 0);
      const maxValue = Math.max(...data);
      
      const dataWithStyle = data.map((value, index) => {
        let itemStyle;
        if (value === 0) {
          itemStyle = { color: '#E0E0E0' };
        } else if (value === maxValue && maxValue > 0) {
          itemStyle = { 
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: '#7A1528' },
              { offset: 1, color: '#C41E3A' }
            ])
          };
        } else {
          itemStyle = { 
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: '#D4A843' },
              { offset: 1, color: '#C41E3A' }
            ])
          };
        }
        return { value: value, itemStyle: itemStyle };
      });

      const option = {
        backgroundColor: 'transparent',
        grid: { left: '12%', right: '10%', top: '15%', bottom: '15%' },
        xAxis: {
          type: 'category',
          data: ['展点1', '展点2', '展点3', '展点4'],
          axisLine: { lineStyle: { color: '#E8E8E8' } },
          axisLabel: { color: '#666666', fontSize: 12 }
        },
        yAxis: {
          type: 'value',
          minInterval: 1,
          axisLine: { show: false },
          splitLine: { lineStyle: { color: '#F0F0F0' } },
          axisLabel: { color: '#666666' }
        },
        tooltip: {
          trigger: 'axis',
          backgroundColor: 'rgba(255, 255, 255, 0.95)',
          borderColor: '#E8E8E8',
          textStyle: { color: '#333333' },
          formatter: function(params) {
            const val = params[0].value;
            const percent = total > 0 ? ((val / total) * 100).toFixed(1) : 0;
            return `<strong>${params[0].name}</strong><br/>数量：${val} 人<br/>占比：${percent}%`;
          }
        },
        series: [{
          type: 'bar',
          data: dataWithStyle,
          barWidth: 40,
          barGap: '20%',
          itemStyle: { borderRadius: [4, 4, 0, 0] },
          label: { show: true, position: 'top', color: '#C41E3A', fontWeight: 600, fontSize: 12 }
        }]
      };

      if (total === 0) {
        option.graphic = {
          type: 'text',
          left: 'center',
          top: 'middle',
          style: {
            text: '暂无数据',
            fontSize: 16,
            fill: '#999999'
          }
        };
      }

      flowerChart.setOption(option);
    }

    function renderCheckinChart(data) {
      if (!checkinChart) return;
      const total = data.reduce((a, b) => a + b, 0);
      const maxValue = Math.max(...data);
      
      const dataWithStyle = data.map((value, index) => {
        let itemStyle;
        if (value === 0) {
          itemStyle = { color: '#E0E0E0' };
        } else if (value === maxValue && maxValue > 0) {
          itemStyle = { 
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: '#7A1528' },
              { offset: 1, color: '#C41E3A' }
            ])
          };
        } else {
          itemStyle = { 
            color: new echarts.graphic.LinearGradient(0, 0, 0, 1, [
              { offset: 0, color: '#D4A843' },
              { offset: 1, color: '#C41E3A' }
            ])
          };
        }
        return { value: value, itemStyle: itemStyle };
      });

      const option = {
        backgroundColor: 'transparent',
        grid: { left: '12%', right: '10%', top: '15%', bottom: '15%' },
        xAxis: {
          type: 'category',
          data: ['展点1', '展点2', '展点3', '展点4'],
          axisLine: { lineStyle: { color: '#E8E8E8' } },
          axisLabel: { color: '#666666', fontSize: 12 }
        },
        yAxis: {
          type: 'value',
          minInterval: 1,
          axisLine: { show: false },
          splitLine: { lineStyle: { color: '#F0F0F0' } },
          axisLabel: { color: '#666666' }
        },
        tooltip: {
          trigger: 'axis',
          backgroundColor: 'rgba(255, 255, 255, 0.95)',
          borderColor: '#E8E8E8',
          textStyle: { color: '#333333' },
          formatter: function(params) {
            const val = params[0].value;
            const percent = total > 0 ? ((val / total) * 100).toFixed(1) : 0;
            return `<strong>${params[0].name}</strong><br/>数量：${val} 次<br/>占比：${percent}%`;
          }
        },
        series: [{
          type: 'bar',
          data: dataWithStyle,
          barWidth: 40,
          barGap: '20%',
          itemStyle: { borderRadius: [4, 4, 0, 0] },
          label: { show: true, position: 'top', color: '#C41E3A', fontWeight: 600, fontSize: 12 }
        }]
      };

      if (total === 0) {
        option.graphic = {
          type: 'text',
          left: 'center',
          top: 'middle',
          style: {
            text: '暂无数据',
            fontSize: 16,
            fill: '#999999'
          }
        };
      }

      checkinChart.setOption(option);
    }

    window.addEventListener('resize', function () {
      if (flowerChart) flowerChart.resize();
      if (checkinChart) checkinChart.resize();
    });

    async function loadDashboard() {
      try {
        let totalFlowers = 0;
        let flowerData = [];
        for (let i = 1; i <= 4; i++) {
          const res = await fetch(`/api/flower/${i}`);
          const data = await res.json();
          const count = data.totalCount || 0;
          totalFlowers += count;
          flowerData.push(count);
        }
        document.getElementById('totalFlowers').textContent = totalFlowers;

        const checkinRes = await fetch('/api/checkin/stats');
        const checkinData = await checkinRes.json();
        const stats = checkinData.stats || { '1': 0, '2': 0, '3': 0, '4': 0 };
        const checkinDataArr = [stats['1'], stats['2'], stats['3'], stats['4']];
        const totalCheckins = Object.values(stats).reduce((a, b) => a + b, 0);
        document.getElementById('totalCheckins').textContent = totalCheckins;

        const msgRes = await fetch('/api/admin/messages');
        const msgData = await msgRes.json();
        const allMessages = msgData.list || [];
        const pendingMsgs = allMessages.filter((m) => m.status === 0);
        document.getElementById('totalMessages').textContent = allMessages.length;
        document.getElementById('pendingMessages').textContent = pendingMsgs.length;

        const overviewRes = await fetch('/api/stats/overview');
        const overviewData = await overviewRes.json();
        if (overviewData.success) {
          document.getElementById('totalVisits').textContent = overviewData.totalVisits || 0;
          document.getElementById('todayVisits').textContent = overviewData.todayVisits || 0;
          if (overviewData.hotExhibit) {
            document.getElementById('hotExhibit').textContent = overviewData.hotExhibit.name;
            document.getElementById('hotExhibitCount').textContent = `${overviewData.hotExhibit.count} 次访问`;
          } else {
            document.getElementById('hotExhibit').textContent = '暂无数据';
            document.getElementById('hotExhibitCount').textContent = '';
          }
        }

        initCharts();
        renderFlowerChart(flowerData);
        renderCheckinChart(checkinDataArr);
      } catch (err) {
        console.error('Error loading dashboard:', err);
      }
    }

    async function loadMessages() {
      try {
        const res = await fetch('/api/admin/messages');
        const data = await res.json();
        allMessagesData = data.list || [];
        renderMessages();
      } catch (err) {
        console.error('Error loading messages:', err);
      }
    }

    function renderMessages() {
      let filtered = allMessagesData;
      if (currentFilter === 'pending') {
        filtered = allMessagesData.filter((m) => m.status === 0);
      } else if (currentFilter === 'approved') {
        filtered = allMessagesData.filter((m) => m.status === 1);
      } else if (currentFilter === 'rejected') {
        filtered = allMessagesData.filter((m) => m.status === 2);
      }

      const html = filtered.map((msg) => {
        let statusClass = '';
        let statusText = '';
        if (msg.status === 0) {
          statusClass = 'status-pending';
          statusText = '待审核';
        } else if (msg.status === 1) {
          statusClass = 'status-approved';
          statusText = '已通过';
        } else if (msg.status === 2) {
          statusClass = 'status-rejected';
          statusText = '已拒绝';
        }

        const showActions = msg.status === 0;

        return `
          <div class="message-card ${statusClass}" data-id="${msg.id}">
            <div class="message-meta">
              <strong>${escapeHtml(msg.nickname)}</strong>
              <span class="message-time">${msg.created_at}</span>
              <span class="message-status ${statusClass}">${statusText}</span>
            </div>
            <p class="message-content">${escapeHtml(msg.content).replace(/\n/g, '<br>')}</p>
            ${showActions ? `
              <div class="message-actions">
                <button class="btn btn-approve" onclick="approveMessage(${msg.id})">通过</button>
                <button class="btn btn-reject" onclick="rejectMessage(${msg.id})">拒绝</button>
              </div>` : ''}
          </div>`;
      }).join('');

      document.getElementById('messageList').innerHTML = html || '<p class="empty-hint">暂无留言</p>';
    }

    function escapeHtml(s) {
      return String(s || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function removeMessageFromList(id) {
      const card = document.querySelector(`.message-card[data-id="${id}"]`);
      if (card) {
        card.style.transition = 'opacity 0.3s, transform 0.3s';
        card.style.opacity = '0';
        card.style.transform = 'translateX(20px)';
        setTimeout(() => {
          allMessagesData = allMessagesData.filter((m) => m.id !== id);
          renderMessages();
        }, 300);
      }
    }

    async function approveMessage(id) {
      try {
        const res = await fetch(`/api/admin/messages/${id}/approve`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          removeMessageFromList(id);
          loadDashboard();
        } else {
          alert('审核失败');
        }
      } catch (err) {
        console.error('Error approving message:', err);
        alert('操作失败');
      }
    }

    async function rejectMessage(id) {
      try {
        const res = await fetch(`/api/admin/messages/${id}/reject`, { method: 'POST' });
        const data = await res.json();
        if (data.success) {
          removeMessageFromList(id);
          loadDashboard();
        } else {
          alert('操作失败');
        }
      } catch (err) {
        console.error('Error rejecting message:', err);
        alert('操作失败');
      }
    }

    checkLogin();
  </script>
</body>
</html>
